redis-master:
  image: redis:7-alpine
  container_name: redis-master
  ports:
    - "6379:6379"
  command: redis-server --requirepass masterpassword
  volumes:
    - /data/redis-master:/data

redis-slave1:
  image: redis:7-alpine
  container_name: redis-slave1
  ports:
    - "6380:6379"
  command: redis-server --replicaof redis-master 6379 --masterauth masterpassword
  volumes:
    - /data/redis-slave1:/data
  links:
    - redis-master

redis-slave2:
  image: redis:7-alpine
  container_name: redis-slave2
  ports:
    - "6381:6379"
  command: redis-server --replicaof redis-master 6379 --masterauth masterpassword
  volumes:
    - /data/redis-slave2:/data
  links:
    - redis-master
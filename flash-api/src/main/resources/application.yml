      password: 1225dmf1212.
      virtual-host: /
      # 开启发送方确认机制
      #publisher-confirms: true
      # 连接池配置
      connection-timeout: 5000
      cache:
        channel:
          size: 25
        connection:
          mode: channel
      # 发布确认      # 开启发送方返回机制
      publisher-confirm-type: correlated
      publisher-returns: true
      # 消费者配置
      listener:
        simple:
          # 消费者最小数量
          concurrency: 1
          # 消费者最大数量
          max-concurrency: 20
          # 每次从队列中获取的消息数量
          prefetch: 50
          # 消费者自动启动
          auto-startup: true
          # 被拒绝的消息重新进入队列
          default-requeue-rejected: true
          # 签收模式：手动签收
          acknowledge-mode: manual
          retry:
            enabled: true
            max-attempts: 3
            initial-interval: 1000ms
            multiplier: 2.0
            max-interval: 10000ms
  profiles:
    active: prod
  cache:

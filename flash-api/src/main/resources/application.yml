jwt:
  token:
    expire:
      time: 30
server:
  port: 9528
app:
  elasticsearch:
    index-name: articles
# 线程池配置
thread:
  pool:
    coreSize: 20                     # 核心线程数
    maxSize: 100                     # 最大线程数
    keepAliveTime: 120               # 线程空闲时间（秒）
    queueCapacity: 2000             # 队列容量
    threadPrefix: "business-thread"  # 线程名前缀

# 日志配置
logging:
  level:
    cn.enilu.Thread: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
# 监控端点（可选）
management:
  endpoints:
    web:
      exposure:
        include: "health,metrics,info"
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always
  health: ##关闭安全检查
    elasticsearch:
      enabled: false


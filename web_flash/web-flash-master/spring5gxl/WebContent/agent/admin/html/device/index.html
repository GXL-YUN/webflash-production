<%@ page language="java" contentType="text/html; charset=utf-8"
    pageEncoding="utf-8"%>
<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>jquery分页插件分页样式</title>
		<script type="text/javascript" src="../../js/jquery-1.7.1.min.js" ></script>
		<link rel="stylesheet" href="../../css/cypager.min.css" />
	</head>
	<!--/************************************************************
 *																*
 * 						      代码库							*
 *                        www.dmaku.com							*
 *       		  努力创建完善、持续更新插件以及模板			*
 * 																*
**************************************************************-->
	<body>		
		<br/><br/><br/>
		<div class="page">
			<div id="pagerArea" unselectable="on" onselectstart="return false;" style="-moz-user-select:none;"></div>
			</br>
			</br>
			<div id="console" style='padding-left:10px'>sss</div>
		</div>
				
	</body>
	<script type="text/javascript" src="../../js/cypager.min.js" ></script>
	<script>
		$(function(){
				$("#pagerArea").cypager({pg_size:10,pg_nav_count:8,pg_total_count:194,pg_call_fun:function(count){
					$("#console").html("正在加载第("+count+")页的数据，请稍后.......");
				}});
			});



	$('#console').click(function(){
            var options = {
                ajaxPrefix: '',
                ajaxComplete: function(){
                    console.log('ajax complete');
                    this.buttons([{
                        type: Dialogify.BUTTON_PRIMARY
                    }]);
                }
            };

            new Dialogify('./2-1.html', options)
                .title('Ajax Dialogify')
                .show();
        });
};

new Dialogify('./view.html', options)
    .title('Ajax Dialogify')
    .show();
</script>
</html>
